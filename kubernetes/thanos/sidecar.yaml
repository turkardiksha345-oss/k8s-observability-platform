apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: thanos-sidecar
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-sidecar
spec:
  serviceName: thanos-sidecar
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-sidecar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-sidecar
    spec:
      containers:
        - name: thanos-sidecar
          image: quay.io/thanos/thanos:v0.35.1
          args:
            - sidecar
            - --http-address=0.0.0.0:10902
            - --grpc-address=0.0.0.0:10901
            - --prometheus.url=http://prometheus.monitoring.svc.cluster.local:9090
            - --objstore.config-file=/etc/thanos/object-store.yaml
            - --tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 10902
            - name: grpc
              containerPort: 10901
          volumeMounts:
            - name: objstore-config
              mountPath: /etc/thanos
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: objstore-config
          secret:
            secretName: thanos-objstore-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-sidecar
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-sidecar
spec:
  ports:
    - name: http
      port: 10902
      targetPort: http
    - name: grpc
      port: 10901
      targetPort: grpc
  selector:
    app.kubernetes.io/name: thanos-sidecar
