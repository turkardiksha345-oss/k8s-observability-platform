apiVersion: v1
kind: Secret
metadata:
  name: thanos-objstore-config
  namespace: monitoring
type: Opaque
stringData:
  object-store.yaml: |
    type: s3
    config:
      bucket: "thanos-metrics-prod-bucket-1"
      endpoint: "s3.us-east-1.amazonaws.com"
      region: "us-east-1"
      access_key: "YOUR_AWS_ACCESS_KEY"
      secret_key: "YOUR_AWS_SECRET_KEY"
      insecure: false
      signature_version2: false
      put_user_metadata: {}
      part_size: 134217728
      sse_config:
        type: "SSE-S3"
