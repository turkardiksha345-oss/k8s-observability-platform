apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-query
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-query

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-query

  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-query

    spec:
      containers:
        - name: thanos-query
          image: quay.io/thanos/thanos:v0.35.1
          imagePullPolicy: IfNotPresent

          args:
            - query

            - --http-address=0.0.0.0:10902
            - --grpc-address=0.0.0.0:10901

            - --query.replica-label=replica

            # Prometheus Sidecars
            - --store=prometheus.monitoring.svc.cluster.local:10901

            # Store Gateway
            - --store=thanos-store-gateway.monitoring.svc.cluster.local:10901

          ports:
            - name: http
              containerPort: 10902

            - name: grpc
              containerPort: 10901

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-query
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-query

spec:
  type: ClusterIP

  selector:
    app.kubernetes.io/name: thanos-query

  ports:
    - name: http
      port: 9090
      targetPort: 10902

    - name: grpc
      port: 10901
      targetPort: 10901