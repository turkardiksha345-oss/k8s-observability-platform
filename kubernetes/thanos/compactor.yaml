apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-compactor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-compactor

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-compactor

  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-compactor

    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534

      containers:
        - name: compactor
          image: quay.io/thanos/thanos:v0.35.1
          imagePullPolicy: IfNotPresent

          args:
            - compact
            - --http-address=0.0.0.0:10902
            - --data-dir=/var/thanos/compact
            - --objstore.config-file=/etc/thanos/object-store.yaml
            - --retention.resolution-raw=180d
            - --retention.resolution-5m=180d
            - --retention.resolution-1h=365d

          ports:
            - name: http
              containerPort: 10902

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

          volumeMounts:
            - name: objstore-config
              mountPath: /etc/thanos
              readOnly: true

            - name: compactor-data
              mountPath: /var/thanos/compact

      volumes:
        - name: objstore-config
          secret:
            secretName: thanos-objstore-config

        - name: compactor-data
          persistentVolumeClaim:
            claimName: thanos-compactor-data