apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring

data:
  datasource.yaml: |
    apiVersion: 1

    datasources:
      - name: Thanos-Query
        type: prometheus
        access: proxy
        url: http://thanos-query.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true