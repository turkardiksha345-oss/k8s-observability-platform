apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus

spec:
  type: ClusterIP

  selector:
    app.kubernetes.io/name: prometheus

  ports:

    - name: web
      port: 9090
      targetPort: web

    - name: grpc
      port: 10901
      targetPort: grpc

    - name: http
      port: 10902
      targetPort: http