apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-bucket-web
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-bucket-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-bucket-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-bucket-web
    spec:
      containers:
        - name: bucket-web
          image: quay.io/thanos/thanos:v0.35.1
          args:
            - bucket
            - web
            - --http-address=0.0.0.0:10902
            - --objstore.config-file=/etc/thanos/object-store.yaml
          ports:
            - name: http
              containerPort: 10902
          volumeMounts:
            - name: objstore-config
              mountPath: /etc/thanos
      volumes:
        - name: objstore-config
          secret:
            secretName: thanos-objstore-config
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-bucket-web
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 10902
      targetPort: http
  selector:
    app.kubernetes.io/name: thanos-bucket-web
