apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
spec:
  serviceName: prometheus
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=30d
            - --storage.tsdb.max-block-chunks=500
            - --web.enable-lifecycle
            - --web.enable-admin-api
            - --enable-feature=remote-write-receiver
            - --cluster.listen-address=0.0.0.0:9094
            - --cluster.peer=prometheus-0.prometheus.monitoring.svc.cluster.local:9094
            - --cluster.peer=prometheus-1.prometheus.monitoring.svc.cluster.local:9094
          ports:
            - name: web
              containerPort: 9090
            - name: cluster
              containerPort: 9094
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
